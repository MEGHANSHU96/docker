trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  dockerRegistryConnection: 'DockerHubConnection'
  imageRepository: 'meghanshu0/tikkle-app'

steps:
- task: Docker@2
  displayName: Login to Docker Hub
  inputs:
    command: login
    containerRegistry: $(dockerRegistryConnection)

- task: Docker@2
  displayName: Build image
  inputs:
    command: build
    repository: $(imageRepository)
    dockerfile: '$(Build.SourcesDirectory)/tikkle/Dockerfile'
    tags: latest

- task: Docker@2
  displayName: Push image
  inputs:
    command: push
    repository: $(imageRepository)
    tags: latest