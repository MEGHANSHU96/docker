trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'
  # --- ADD THESE VARIABLES ---
  # These names must match what you created in the Azure Portal/DevOps
  dockerRegistryConnection: 'MyACRConnection'       # Name of your Docker Service Connection
  containerRegistryURL: 'yourregistry.azurecr.io'   # The URL of your ACR
  imageRepository: 'tikkle-app'                     # What you want to name this specific image
  azureSubscriptionConnection: 'Azure-Sub-Connection' # Name of your Azure Resource Manager connection
  webAppName: 'docker-proj-app'                     # The name of your Azure Web App

stages:
# STAGE 1: Build the image and save it to the registry
- stage: Build
  displayName: Build and Push image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Build and Push an image
      inputs:
        command: buildAndPush   # CHANGED from 'build' to 'buildAndPush'
        repository: $(imageRepository)
        containerRegistry: $(dockerRegistryConnection)
        dockerfile: '$(Build.SourcesDirectory)/tikkle/Dockerfile'
        tags: |
          $(tag)

# STAGE 2: Tell the server to run the new image
- stage: Deploy
  displayName: Deploy to Azure Web App
  dependsOn: Build      # Ensures it only tries to run if the build succeeds
  jobs:
  - deployment: DeployContainer
    environment: 'production'
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Run Container on Web App'
            inputs:
              azureSubscription: $(azureSubscriptionConnection)
              appName: $(webAppName)
              # This tells the Web App exactly which image and version to run
              containers: '$(containerRegistryURL)/$(imageRepository):$(tag)'