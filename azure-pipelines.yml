trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  dockerRegistryConnection: 'mydocker'
  imageRepository: 'meghanshu0/tikkle-app'
  tag: '$(Build.BuildId)'

steps:
- task: Docker@2
  displayName: Login to Docker Hub
  inputs:
    command: login
    containerRegistry: $(dockerRegistryConnection)

- script: |
    docker build -t $(imageRepository):$(tag) -t $(imageRepository):latest -f $(Build.SourcesDirectory)/tikkle/Dockerfile $(Build.SourcesDirectory)/tikkle
  displayName: Build image

- script: |
    docker push $(imageRepository):$(tag)
    docker push $(imageRepository):latest
  displayName: Push image