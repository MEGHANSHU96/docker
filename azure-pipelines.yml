trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # 1. This must match your Docker Hub Connection (using the PAT you made)
  dockerRegistryConnection: 'DockerHubConnection' 
  # 2. Your Docker Hub username/repo
  imageRepository: 'meghanshu0/tikkle-app' 
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: 'Build and Push to Docker Hub'
  jobs:
  - job: Build
    steps:
    - task: Docker@2
      displayName: 'Build and Push Image'
      inputs:
        command: buildAndPush
        containerRegistry: $(dockerRegistryConnection)
        repository: $(imageRepository)
        dockerfile: '$(Build.SourcesDirectory)/tikkle/Dockerfile'
        tags: |
          $(tag)
          latest

